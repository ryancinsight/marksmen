<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksmen Inspector</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <span class="gradient-text">Marksmen</span> Inspector
            </div>
            <div class="status" id="status-indicator">Ready</div>
        </header>

        <main class="split-view">
            <section class="editor-pane">
                <div class="pane-header">
                    Input (Markdown)
                    <button id="set-base-btn" title="Set current text as base for diffing">Set as Base</button>
                </div>
                <textarea id="markdown-input" spellcheck="false"># Marksmen Roundtrip Test

This is **bold**, _italic_, ~~strikethrough~~, and `inline code`.

## Math

Display equation:
$$i\hbar\frac{\partial}{\partial t} \Psi = \hat{H}\Psi$$

Inline: The solution is $x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$.

## Table

| Format | Math | Code | Diagrams |
| :----- | :---: | :---: | :---: |
| HTML   | ✓ | ✓ | ✓ |
| DOCX   | ✓ | ✓ | ✓ |
| ODT    | ✓ | ✓ | ✓ |
| Typst  | ✓ | ✓ | ✓ |
| PDF    | ✓ | ✓ | ✓ |

## Code

```rust
fn main() {
    let greeting = "Hello, world!";
    println!("{}", greeting);
    let sum: i64 = (1..=100).sum();
    println!("Sum 1..100 = {}", sum);
}
```

```bash
#!/usr/bin/env bash
set -euo pipefail
echo "Build started"
cargo build --release
echo "Done"
```

## Mermaid Diagram

```mermaid
graph TD
    A[Input Markdown] --> B{Parse}
    B --> C[HTML]
    B --> D[DOCX]
    B --> E[ODT]
    B --> F[Typst]
    F --> G[PDF]
```

## Lists

### Unordered with nested ordered sub-items
- First item with **bold** text
  1. Sub-step one
  2. Sub-step two
- Second item with `inline code`
- Third item with $E = mc^2$ math

### Ordered with nested unordered sub-items
1. Parse the Markdown source
   - Tokenize
   - Build AST
2. Translate to format-specific AST
3. Render and export the document
   - DOCX
   - ODT
   - Typst/PDF

## Blockquote

> "The purpose of abstracting is not to be vague, but to create a new semantic level
> in which one can be absolutely precise."
>
> — Edsger W. Dijkstra

## Links and Horizontal Rule

Visit [Typst](https://typst.app) or [CommonMark Spec](https://spec.commonmark.org) for reference.

---

*End of roundtrip comparison document.*
</textarea>
            </section>

            <section class="inspector-pane">
                <div class="pane-header tabs">
                    <!-- Preview tabs -->
                    <div class="tab-group">
                        <span class="tab-group-label">Preview</span>
                        <button class="tab active" data-kind="preview" data-target="html">HTML</button>
                        <button class="tab" data-kind="preview" data-target="latex">LaTeX</button>
                        <button class="tab" data-kind="preview" data-target="typst">Typst</button>
                        <button class="tab" data-kind="preview" data-target="docx">DOCX</button>
                        <button class="tab" data-kind="preview" data-target="odt">ODT</button>
                        <button class="tab" data-kind="preview" data-target="ppt">PPTX</button>
                        <button class="tab" data-kind="preview" data-target="marp">Marp</button>
                        <button class="tab" data-kind="preview" data-target="pdf">PDF</button>
                        <button class="tab" data-kind="preview" data-target="diff">Diff</button>
                    </div>
                    <div class="tab-divider"></div>
                    <!-- Source tabs -->
                    <div class="tab-group">
                        <span class="tab-group-label">Source</span>
                        <button class="tab" data-kind="source" data-target="ast">AST</button>
                        <button class="tab" data-kind="source" data-target="html-src">HTML</button>
                        <button class="tab" data-kind="source" data-target="latex-src">LaTeX</button>
                        <button class="tab" data-kind="source" data-target="typst-src">Typst</button>
                        <button class="tab" data-kind="source" data-target="docx-xml">DOCX XML</button>
                        <button class="tab" data-kind="source" data-target="odt-xml">ODT XML</button>
                        <button class="tab" data-kind="source" data-target="marp-src">Marp</button>
                    </div>
                </div>

                <div class="tab-content-container">
                    <!-- Preview panels: iframes for max fidelity -->
                    <iframe id="html-content" class="tab-content preview-frame active" sandbox="allow-same-origin"></iframe>
                    <iframe id="latex-content" class="tab-content preview-frame" sandbox="allow-same-origin"></iframe>
                    <iframe id="typst-content" class="tab-content preview-frame" sandbox="allow-same-origin"></iframe>
                    <iframe id="docx-content" class="tab-content preview-frame" sandbox="allow-same-origin"></iframe>
                    <iframe id="odt-content" class="tab-content preview-frame" sandbox="allow-same-origin"></iframe>
                    <div id="pdf-content" class="tab-content pdf-container">
                        <embed id="pdf-embed" type="application/pdf" width="100%" height="100%" />
                    </div>
                    <div id="ppt-content" class="tab-content pdf-container">
                        <iframe id="ppt-preview-frame" class="preview-frame" style="width:100%;height:calc(100% - 48px);border:none;" sandbox="allow-same-origin"></iframe>
                        <div style="padding:8px;text-align:center;">
                            <a id="ppt-download-link" href="#" download="presentation.pptx" style="font-size:0.85em;color:#4472C4;">⬇ Download PPTX</a>
                        </div>
                    </div>
                    <iframe id="marp-content" class="tab-content preview-frame" sandbox="allow-same-origin"></iframe>
                    <iframe id="diff-content" class="tab-content preview-frame" sandbox="allow-same-origin"></iframe>

                    <!-- Source panels -->
                    <pre id="ast-content" class="tab-content source-pane">Loading...</pre>
                    <pre id="html-src-content" class="tab-content source-pane">Loading...</pre>
                    <pre id="latex-src-content" class="tab-content source-pane">Loading...</pre>
                    <pre id="typst-src-content" class="tab-content source-pane">Loading...</pre>
                    <pre id="docx-xml-content" class="tab-content source-pane">Loading...</pre>
                    <pre id="odt-xml-content" class="tab-content source-pane">Loading...</pre>
                    <pre id="marp-src-content" class="tab-content source-pane">Loading...</pre>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
